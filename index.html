/* ============================================================

   ============================================================ */

const css = `
  :root{
    --orange:#E8622A;
    --orange-dk:#C44E1E;
    --yellow:#F9D949;
    --mint:#7ECFB3;
    --sky:#A8D8EA;
    --pink:#F4A7B9;
    --lavender:#C5B8E8;
    --coral:#F4826A;
    --lime:#B5E48C;
    --black:#1A1A1A;
    --white:#FFFDF9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Nunito',sans-serif;background:var(--white);color:var(--black);overflow-x:hidden;}

  nav{position:fixed;top:0;left:0;right:0;z-index:200;height:58px;background:var(--orange);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;border-bottom:3px solid var(--black);}
  .nav-logo{font-family:'Fredoka One',cursive;font-size:1.3rem;color:#fff;text-decoration:none;letter-spacing:.02em;}
  .nav-links{display:flex;gap:.15rem;list-style:none;}
  .nav-links a{font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.75);text-decoration:none;padding:.35rem .75rem;border-radius:20px;transition:background .2s,color .2s;}
  .nav-links a:hover{background:rgba(255,255,255,.2);color:#fff;}

  #hero{min-height:100vh;background:var(--orange);border-bottom:3px solid var(--black);padding:80px 3rem 3rem;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;}

  .blob-1{width:180px;height:180px;background:var(--yellow);top:70px;right:6%;animation:float1 6s ease-in-out infinite;}
  .blob-2{width:130px;height:130px;background:var(--mint);bottom:80px;right:18%;animation:float2 5s ease-in-out infinite;}
  .blob-3{width:90px;height:90px;background:var(--pink);top:55%;right:32%;animation:float1 7s ease-in-out infinite 1s;}
  .blob-4{width:70px;height:70px;background:var(--sky);bottom:160px;right:42%;animation:float2 4.5s ease-in-out infinite .5s;}
  .blob-5{width:150px;height:150px;background:var(--lavender);bottom:40px;right:3%;animation:float1 8s ease-in-out infinite 2s;}
  @keyframes float1{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-22px) rotate(5deg);}}
  @keyframes float2{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-16px) rotate(-6deg);}}
  .spin-star{position:absolute;top:75px;right:4%;width:65px;height:65px;animation:spin 12s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .hero-tag{display:inline-flex;align-items:center;gap:.5rem;background:#fff;color:var(--black);border:2.5px solid var(--black);border-radius:30px;font-size:.75rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.4rem 1.1rem;width:fit-content;margin-bottom:1.5rem;animation:wiggle 3s ease-in-out infinite;}
  @keyframes wiggle{0%,100%{transform:rotate(-1deg);}50%{transform:rotate(1.5deg);}}
  .tag-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);animation:pulse 1.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.4);}}
  .hero-h1{font-family:'Fredoka One',cursive;font-size:clamp(2.8rem,7vw,6.5rem);line-height:.92;color:#fff;letter-spacing:-.01em;position:relative;z-index:1;margin-bottom:1.5rem;}

  .hero-h1 .yellow-word{color:var(--yellow);display:inline-block;animation:bounce-word 2s ease-in-out infinite;}

  .hero-sub{font-size:1rem;font-weight:700;color:rgba(255,255,255,.85);max-width:480px;line-height:1.7;position:relative;z-index:1;margin-bottom:1.5rem;}

  .hero-btns{display:flex;gap:1rem;flex-wrap:wrap;position:relative;z-index:1;}

  .btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;padding:.75rem 1.8rem;border:2.5px solid var(--black);border-radius:30px;transition:transform .2s,box-shadow .2s;display:inline-block;}

  .btn-white{background:#fff;color:var(--black);}
  .btn-dark{background:var(--black);color:#fff;}

  .marquee-track{display:flex;width:max-content;animation:marquee 18s linear infinite;}
  .marquee-item{font-family:'Fredoka One',cursive;font-size:1.1rem;letter-spacing:.06em;color:var(--black);white-space:nowrap;padding:0 1.5rem;}
  .marquee-sep{color:var(--orange);margin:0 .25rem;}
  @keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

  .marquee-wrap-2{overflow:hidden;background:var(--orange);border-top:3px solid var(--black);border-bottom:3px solid var(--black);padding:.65rem 0;}
  .marquee-track-2{display:flex;width:max-content;animation:marquee 22s linear infinite reverse;}

  #hours{background:var(--white);padding:6rem 3rem;position:relative;overflow:hidden;}
  .hours-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1.3fr;gap:5rem;align-items:start;}
  .section-eyebrow{font-size:.7rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;display:inline-flex;align-items:center;gap:.5rem;margin-bottom:1rem;}
  .eyebrow-pill{background:var(--orange);color:#fff;border:2px solid var(--black);border-radius:20px;padding:.2rem .75rem;font-family:'Fredoka One',cursive;font-size:.8rem;letter-spacing:.05em;}
  .section-h2{font-family:'Fredoka One',cursive;font-size:clamp(2.5rem,5vw,4.5rem);line-height:.95;color:var(--black);margin-bottom:1rem;letter-spacing:-.01em;}
  .section-h2 em{font-style:normal;color:var(--orange);}
  .section-desc{font-size:.97rem;color:#666;line-height:1.85;font-weight:600;margin-bottom:2rem;max-width:340px;}
  .location-card{background:var(--mint);border:2.5px solid var(--black);border-radius:18px;padding:1.5rem 1.75rem;position:relative;box-shadow:5px 5px 0 var(--black);}
  .location-card p{font-size:.92rem;font-weight:700;line-height:2;color:var(--black);}

  .hour-time{font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--black);display:flex;align-items:center;gap:.75rem;}
  .best-pill{font-family:'Nunito',sans-serif;font-size:.58rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--orange);color:#fff;border:1.5px solid var(--black);border-radius:20px;padding:.2rem .6rem;}
  .shape-blob{position:absolute;border-radius:50%;border:3px solid var(--black);pointer-events:none;}

  .callout-band{background:var(--black);border-top:3px solid var(--black);border-bottom:3px solid var(--black);padding:5rem 3rem;position:relative;overflow:hidden;}
  .callout-band-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;}
  .callout-band h2{font-family:'Fredoka One',cursive;font-size:clamp(3rem,6vw,6rem);line-height:.92;color:#fff;}
  .callout-band h2 em{font-style:normal;color:var(--yellow);}
  .callout-band p{font-size:1rem;color:rgba(255,255,255,.7);line-height:1.85;font-weight:600;}
  .callout-float{position:absolute;border-radius:50%;border:2.5px solid rgba(255,255,255,.15);}

  #donations{background:var(--sky);border-top:3px solid var(--black);padding:6rem 3rem;position:relative;overflow:hidden;}
  .donations-inner{max-width:1100px;margin:0 auto;}
  .donations-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:3.5rem;flex-wrap:wrap;gap:2rem;}
  .donations-top p{max-width:340px;font-size:.95rem;color:#444;line-height:1.8;font-weight:600;}

  .accept-card{background:#fff;border:2.5px solid var(--black);border-radius:18px;padding:1.8rem;box-shadow:4px 4px 0 var(--black);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;}
  .accept-card:hover{transform:translateY(-4px) translateX(-2px);box-shadow:6px 6px 0 var(--black);}
  .accept-card.no{background:#f5f5f5;box-shadow:none;border-color:#ccc;opacity:.55;}
  .card-status{font-size:.62rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem;}
  .card-status.yes{color:var(--orange);}
  .card-status.no-txt{color:#aaa;}
  .accept-card h4{font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--black);margin-bottom:.4rem;}
  .accept-card p{font-size:.85rem;color:#666;line-height:1.7;font-weight:600;}
  .card-corner{position:absolute;bottom:-16px;right:-16px;width:60px;height:60px;border-radius:50%;border:2.5px solid var(--black);opacity:.2;}

  #events{background:var(--white);padding:6rem 3rem;position:relative;overflow:hidden;}
  .events-inner{max-width:1100px;margin:0 auto;}
  .events-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:3.5rem;flex-wrap:wrap;gap:1rem;}
  .events-follow{font-size:.78rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#888;text-decoration:none;border-bottom:2px solid #ddd;padding-bottom:.15rem;transition:color .2s,border-color .2s;}
  .events-follow:hover{color:var(--orange);border-color:var(--orange);}
  .events-grid{display:flex;flex-direction:column;gap:1px;background:#eee;}
  .event-row{background:var(--white);display:grid;grid-template-columns:auto 1fr auto;gap:2rem;align-items:center;padding:1.8rem 2rem;transition:background .2s;}
  .event-row:hover{background:#FFF5F0;}
  .event-badge{width:64px;height:64px;background:var(--orange);border:2.5px solid var(--black);border-radius:14px;box-shadow:3px 3px 0 var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
  .event-badge .mo{font-size:.55rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.8);line-height:1;margin-bottom:2px;}

  .event-info h4{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--black);margin-bottom:.2rem;}

  #about{background:var(--lavender);border-top:3px solid var(--black);padding:6rem 3rem;position:relative;overflow:hidden;}

  .stat-num{font-family:'Fredoka One',cursive;font-size:2.5rem;color:var(--orange);line-height:1;flex-shrink:0;}
  .stat-lbl{font-size:.82rem;font-weight:800;color:#666;line-height:1.4;}

  #shop{background:var(--lime);border-top:3px solid var(--black);border-bottom:3px solid var(--black);padding:6rem 3rem;position:relative;overflow:hidden;}
  .shop-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;}
  .shop-visual{aspect-ratio:1;background:var(--white);border:2.5px solid var(--black);border-radius:24px;box-shadow:6px 6px 0 var(--black);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .shop-paw{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.06;}
  .shop-label{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--orange);text-align:center;line-height:1.3;position:relative;z-index:1;}

  footer{background:var(--black);padding:4rem 3rem 2.5rem;}
  .foot-top{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr;gap:4rem;padding-bottom:3rem;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:2rem;}
  .foot-brand-name{font-family:'Fredoka One',cursive;font-size:1.6rem;color:#fff;display:block;margin-bottom:.75rem;}
  .foot-brand-name span{color:var(--orange);}
  .foot-brand p{font-size:.82rem;color:rgba(255,255,255,.35);line-height:1.9;}
  .foot-brand a{color:var(--orange);text-decoration:none;}
  .foot-col h5{font-size:.62rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:1.2rem;}
  .foot-col ul{list-style:none;}
  .foot-col li{margin-bottom:.5rem;}
  .foot-col a{font-size:.88rem;color:rgba(255,255,255,.5);text-decoration:none;font-weight:700;transition:color .2s;}
  .foot-col a:hover{color:#fff;}
  .foot-bottom{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
  .foot-bottom p{font-size:.75rem;color:rgba(255,255,255,.2);}
  .foot-social{display:flex;gap:.5rem;}
  .foot-social a{width:34px;height:34px;border:1px solid rgba(255,255,255,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;color:rgba(255,255,255,.4);text-decoration:none;transition:background .2s,color .2s,border-color .2s;}
  .foot-social a:hover{background:var(--orange);color:#fff;border-color:var(--orange);}

  .reveal{opacity:0;transform:translateY(28px);transition:opacity .65s ease,transform .65s ease;}
  .reveal.on{opacity:1;transform:none;}
  .r1{transition-delay:.1s;}.r2{transition-delay:.2s;}.r3{transition-delay:.3s;}

  @media(max-width:860px){
    nav{padding:0 1.25rem;}
    #hero{padding:90px 1.5rem 4rem;}
    #hours,#donations,#events,#about,#shop{padding:4rem 1.5rem;}
    .callout-band{padding:3.5rem 1.5rem;}
    footer{padding:3rem 1.5rem 2rem;}
    .hours-inner,.callout-band-inner,.about-inner,.shop-inner{grid-template-columns:1fr;gap:3rem;}
    .accept-grid{grid-template-columns:1fr 1fr;}
    .foot-top{grid-template-columns:1fr;gap:2.5rem;}
    .donations-top{flex-direction:column;}
    .event-row{grid-template-columns:auto 1fr;}.event-caret{display:none;}
    .hero-h1{font-size:clamp(2.4rem,10vw,4rem);}
    .blob-3,.blob-4,.blob-5{display:none;}
    .spin-star{display:none;}
  }
  @media(max-width:560px){
    .accept-grid{grid-template-columns:1fr;}
    .nav-links{display:none;}
  }
`;

document.head.insertAdjacentHTML('beforeend', `<style>${css}</style>`);
document.title = CONFIG.storeName + ' — Bend, Oregon';

    <span class="hour-day">${h.day}</span>
    <span class="hour-time">${h.time}${h.best ? ' <span class="best-pill">Best Day</span>' : ''}</span>
  </div>`).join('');

const cardAccents = ['var(--yellow)','var(--orange)','var(--mint)','var(--pink)','var(--lavender)','var(--sky)'];
const donationHTML = CONFIG.donationItems.map((item, i) => `
  <div class="accept-card${item.accepted ? '' : ' no'} reveal r${(i%3)+1}">
    <div class="card-status ${item.accepted ? 'yes' : 'no-txt'}">${item.accepted ? '✦ Accepted' : '✕ Not Accepted'}</div>
    <h4>${item.title}</h4>
    <p>${item.desc}</p>
    ${item.accepted ? `<div class="card-corner" style="background:${cardAccents[i % cardAccents.length]};"></div>` : ''}
  </div>`).join('');

const eventsHTML = CONFIG.events.map((e, i) => `
  <div class="event-row">
    <div class="event-badge"><span class="mo">${e.month}</span><span class="dy">${e.day}</span></div>
    <div class="event-info"><h4>${e.title}</h4><span>${e.meta}</span></div>
    <span class="event-caret">${e.link ? `<a href="${e.link}" target="_blank" style="color:inherit;text-decoration:none;">Details →</a>` : 'Details →'}</span>
  </div>`).join('');

const marquee2Items = CONFIG.events.map(e =>
  `<span class="marquee-item" style="color:#fff;">${e.title} — ${e.month} ${e.day} <span class="marquee-sep" style="color:var(--yellow);">✦</span></span>`
).join('').repeat(4);

document.body.innerHTML = `

  <a href="#" class="nav-logo">${CONFIG.storeName}</a>

}
